# MoQ calibration config for Qwen models
model:
  name: "Qwen/Qwen1.5-0.5B"
  adapter: "llama" # Qwen shares the exact same projection names as Llama (q_proj, gate_proj, etc.)

quantization:
  bits: 8
  weight_bits: 8
  activation_bits: 8
  include_attn: true
  include_mlp: true

calibration:
  strategy: "moq_end_to_end"   # moq_end_to_end | intermediate_mse | cosine | static
  dataset: "wikitext2"
  n_samples: 16
  seq_len: 512
  seed: 42

evaluation:
  ppl_dataset: "wikitext2"
  ppl_seq_len: 2048
  zero_shot_tasks:
    - hellaswag
    - piqa
    - arc_easy
  batch_size: 16

output:
  save_format_map: true
  output_dir: "./results/qwen_moq"
  log_level: "INFO"

# Weight quantization (optional, disabled by default)
weight_quantization:
  enabled: false
  bits: 8
  strategy: "moq_end_to_end"
  candidates: "hardware_default"
